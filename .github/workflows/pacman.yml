name: Generate Pac-Man

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v3

      - name: Generate Pac-Man SVG
        uses: buluma/github-action-pacman@v0.0.1
        with:
          GITHUB_USER: hanumanraj07
          BACKGROUND_COLOR: "#0f0c29"
          DOT_COLOR: "#f97316"
          PACMAN_COLOR: "#facc15"
          GHOST_COLORS: "#ef4444,#f97316,#fb923c"
          TARGET: dist/pacman-contribution-graph.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
          keep_history: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
